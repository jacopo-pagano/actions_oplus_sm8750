      - name: Send Telegram Notification (Failure)
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")
          REPO_URL="https://github.com/${{ github.repository }}"
          CAPTION="❌ <b>Kernel Build Failed!</b> (xkse4 source)
          📱 <b>Device:</b> <code>OnePlus 13</code>
          ⚡ <b>KSU:</b> <code>ReSukiSU</code>
          📅 <b>Date:</b> $DATE
          🔢 <b>Hash:</b> <a href=\"$REPO_URL/commit/${{ github.sha }}\">$(echo "${{ github.sha }}" | cut -c1-8)</a>"
          if [ -f /tmp/kbuild.log ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document="@/tmp/kbuild.log" \
              -F caption="$CAPTION" \
              -F parse_mode="HTML"
          else
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d text="$CAPTION" \
              -d parse_mode="HTML"
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: Download ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips

      - name: Set Environment Variables
        run: |
          FULL_VERSION=6.6.142-palaziks-ShiftPorts
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build-xkse4"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          KSU_TYPENAME="ReSukiSU"
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV

      - name: Create Release
        if: ${{ github.event.inputs.github_release == 'true' }}
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### 📱 OnePlus 13 ReSukiSU SM8750 Kernel (xkse4 source)
          > ⚠️ **ROM Compatibility:** Built with **ZyCromerZ Clang** for **ColorOS / OxygenOS** only.
          > **Source:** [xkse4/android_kernel_common_oneplus_sm8750](https://github.com/xkse4/android_kernel_common_oneplus_sm8750)

          #### Workflow-added features:
          - **Kernel Version:** ${{ env.FULL_VERSION }}
          - **Build Time:** ${{ env.TIME_FORM }}
          - **KSU Branch:** ReSukiSU
          - **SuSFS:** ${{ github.event.inputs.SUSFS }}
          - **BBRv3:** ${{ github.event.inputs.bbrv3_enable }} (re-applied, was reverted from source)
          - **BORE Scheduler:** ${{ github.event.inputs.bore_enable }}
          - **Fengchi/HMBIRD:** ${{ github.event.inputs.fengchi }}
          - **Baseband Guard:** ${{ github.event.inputs.baseband_guard }}
          - **LRNG v59:** ${{ github.event.inputs.lrng_enable }}
          - **Oryon -mcpu=oryon-1:** ${{ github.event.inputs.cpu_opt }} (overrides source -march=armv9.1-a)
          - **Custom Wakelock Blocker:** ${{ github.event.inputs.wakelock_blocker }} (complements Boeffla)
          - **Re-Kernel:** ${{ github.event.inputs.rekernel_enable }} (re-added, was removed from source)
          - **Droidspaces:** ${{ github.event.inputs.droidspaces_enable }}
          - **IP_SET + IPv6 NAT:** ${{ github.event.inputs.ip_set_enable }}
          - **TTL Target:** ${{ github.event.inputs.ttl_enable }}
          - **Extra Mem/Sched Opts:** ${{ github.event.inputs.mem_opt_patches }}

          #### Built-in (xkse4 source — no patches needed):
          - BBR/Brutal/C2TCP/ROCCET (BBR default)
          - ADIOS 3.2 IO Scheduler
          - LZ4 1.10.0 + armv8 asm + LZ4K/LZ4KD
          - ZSTD 1.5.7
          - ZRAM Writeback + Batch + Multi-comp
          - NTSync
          - WireGuard
          - Boeffla Wakelock Blocker (sysfs-based)
          - Full Netfilter (conntrack/NAT/hashlimit/connlimit)
          - F2FS + compression
          - Oryon -march=armv9.1-a+nosve+crypto+sha3+sm4+rng
          - EROFS optimizations
          - Scheduler/cpufreq fixes + high-freq tick
          EOF
          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            release_zips/AnyKernel3_*.zip