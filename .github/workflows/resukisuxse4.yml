name: ReSukiSU OP13 Build (xkse4)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-6.6.142
  cancel-in-progress: true
env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  CCACHE_KEY: ccache-neov4-6.6.142-xkse4
on:
  workflow_dispatch:
    inputs:
      SUSFS:
        description: 'Enable SuSFS (Enhances hide environment)'
        required: true
        type: boolean
        default: true
      bore_enable:
        description: 'Enable BORE Scheduler (Burst-Oriented Response Enhancer)'
        required: true
        type: boolean
        default: false
      rekernel_enable:
        description: 'Enable Re-Kernel Support (was removed from xkse4 source, re-add)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: 'Enable Baseband Guard (Anti-brick modem protection)'
        required: true
        type: boolean
        default: true
      lto_type:
        description: 'LTO Optimization (none = fast compile, thin = default, full = slow)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'
      fengchi:
        description: 'Enable Fengchi / HMBIRD Optimization'
        required: true
        type: boolean
        default: true
      bbrv3_enable:
        description: 'Enable BBRv3 (was reverted from xkse4 source, re-apply)'
        required: true
        type: boolean
        default: true
      lrng_enable:
        description: 'Enable LRNG v59 (better entropy for crypto/gaming)'
        required: true
        type: boolean
        default: false
      cpu_opt:
        description: 'Oryon -mcpu=oryon-1 tuning (overrides source -march=armv9.1-a with microarch-specific scheduling)'
        required: true
        type: boolean
        default: true
      wakelock_blocker:
        description: 'Enable custom Wakelock Blocker (hardcoded blocklist in wakeup.c, complements Boeffla in source)'
        required: true
        type: boolean
        default: true
      github_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false
      droidspaces_enable:
        description: 'Enable Droidspaces (SYSVIPC + PID_NS + POSIX_MQUEUE for proot-distro)'
        required: true
        type: boolean
        default: true
      ip_set_enable:
        description: 'Enable IP_SET + IPv6 NAT (advanced firewall + IPv6 masquerade)'
        required: true
        type: boolean
        default: false
      ttl_enable:
        description: 'Enable TTL/HL Target (hide tethering from carrier detection)'
        required: true
        type: boolean
        default: false
      mem_opt_patches:
        description: 'Enable extra memory/scheduler optimization patches (WildKernels)'
        required: true
        type: boolean
        default: true
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 🧠 Add swap space (for LTO link)
        run: |
          sudo fallocate -l 16G /mnt/swap_lto || sudo dd if=/dev/zero of=/mnt/swap_lto bs=1M count=16384
          sudo chmod 600 /mnt/swap_lto
          sudo mkswap /mnt/swap_lto
          sudo swapon /mnt/swap_lto
          echo "── swap after ──"; free -h

      - name: Cache Clang
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/zyc-clang
          key: zyc-clang-19.0.0git-20240723

      - name: Cache build-tools
        id: buildtools-cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/build-tools
          key: codelinaro-build-tools-ks-kernel-lnx-4.0

      - name: Install dependencies & Init Source
        run: |
          echo "Relocating heavy folders for background deletion..."
          sudo mv /usr/share/dotnet /usr/share/dotnet_trash 2>/dev/null || true
          sudo mv /usr/local/lib/android /usr/local/lib/android_trash 2>/dev/null || true
          sudo mv /opt/ghc /opt/ghc_trash 2>/dev/null || true
          sudo mv /usr/lib/jvm /usr/lib/jvm_trash 2>/dev/null || true
          (sudo nice -n 19 ionice -c 3 rm -rf /usr/share/dotnet_trash /usr/local/lib/android_trash /opt/ghc_trash /usr/lib/jvm_trash) &
          rm -rf kernel_workspace/common kernel_workspace/out 2>/dev/null || true
          mkdir -p kernel_workspace/zyc-clang kernel_workspace/build-tools
          cd kernel_workspace
          sudo apt-get install -y --no-install-recommends -o Dpkg::Use-Pty=0 \
            libelf-dev dos2unix pahole cmake &
          # ── Source: xkse4/android_kernel_common_oneplus_sm8750 ──
          echo "Cloning xkse4 source repository..."
          curl -L https://github.com/xkse4/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_b_16.0.0_oneplus_13.zip \
            -o common.zip &&
          unzip -q common.zip &&
          mv android_kernel_common_oneplus_sm8750-* common &&
          rm -f common.zip &
          # Clang — only download if cache missed
          if [ "${{ steps.clang-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss — downloading ZyCromerZ Clang 19..."
            mkdir -p zyc-clang
            aria2c -x16 -s16 -k1M -j16 --retry-wait=5 --max-tries=10 \
              -d /tmp -o zyc-clang.tar.gz \
              "https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240723-release/Clang-19.0.0git-20240723.tar.gz"
            tar -C zyc-clang -zxf /tmp/zyc-clang.tar.gz
            rm -f /tmp/zyc-clang.tar.gz
          else
            echo "Clang restored from cache, skipping download."
          fi &
          # build-tools — only clone if cache missed
          if [ "${{ steps.buildtools-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss — cloning build-tools..."
            git clone --depth=1 -b ks-kernel.lnx.4.0.r1-rel \
              https://git.codelinaro.org/clo/la/kernel/prebuilts/build-tools.git build-tools
          else
            echo "build-tools restored from cache, skipping clone."
          fi &
          wait
          # NOTE: ABI protection already removed in xkse4 source ("removed abi protected symbol" commit)
          # NOTE: dirty suffix already handled in xkse4 source
          echo "Removing dirty suffix (safety)..."
          for f in common/scripts/setlocalversion; do
            [ -f "$f" ] && sed -i 's/ -dirty//g' "$f"
          done
          echo "Source and tools initialized successfully!"

      - name: Cache ccache-ECS binary
        uses: actions/cache@v4
        id: ecs-cache
        with:
          path: /tmp/ccache-ecs-bin
          key: ccache-ecs-${{ runner.os }}-084a7620

      - name: Build & Install ccache-ECS
        run: |
          if [ -f /tmp/ccache-ecs-bin/ccache ]; then
            echo "ECS binary cached, skipping build"
            sudo cp /tmp/ccache-ecs-bin/ccache /usr/local/bin/ccache
          else
            sudo apt-get install -y --no-install-recommends cmake
            git clone --depth=1 https://github.com/cctv18/ccache-ECS.git /tmp/ccache-ecs
            cd /tmp/ccache-ecs
            ./ci/build-binary
            mkdir -p /tmp/ccache-ecs-bin
            cp install/ccache /tmp/ccache-ecs-bin/ccache
            sudo cp /tmp/ccache-ecs-bin/ccache /usr/local/bin/ccache
          fi
          sudo chmod 755 /usr/local/bin/ccache
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "✅ ECS ccache: $(/usr/local/bin/ccache --version | head -1)"

      - name: Save ccache-ECS binary cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/ccache-ecs-bin
          key: ccache-ecs-${{ runner.os }}-084a7620

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_6.6.142" >> $GITHUB_ENV
          echo "LDCACHE_DIR=$GITHUB_WORKSPACE/ldcache_6.6.142" >> $GITHUB_ENV
          mkdir -p $GITHUB_WORKSPACE/ldcache_6.6.142
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: 6.6.142 (xkse4 source)"

      - name: Restore CCache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Restore LTO Cache
        uses: actions/cache/restore@v4
        if: inputs.lto_type == 'thin'
        with:
          path: ${{ env.LDCACHE_DIR }}
          key: lto-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            lto-cache-${{ runner.os }}-${{ github.ref_name }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-6.6.142.tar.zst"
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi

      - name: Init and Config CCache
        run: |
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          mkdir -p "$CCACHE_DIR"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -o compression=true
          ccache -o compiler_check=none
          ccache -o hash_dir=false
          ccache -o direct_mode=true
          ccache -o depend_mode=false
          ccache -o base_dir="${{ github.workspace }}"
          ccache -o sloppiness=file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros,locale
          echo "Initial CCache status:"
          ccache -s
          echo "Updating atime to achieve cache eviction..."
          find "${{ env.CCACHE_DIR }}" -type f -exec touch -t $(date -d "1 day ago" +%Y%m%d%H%M) {} + || true

      - name: ⚡ Setup ReSukiSU
        run: |
          cd kernel_workspace/common
          echo "🛠️ Setting up ReSukiSU (main)..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          cd KernelSU
          KSU_VERSION_COUNT=$(git rev-list --count HEAD)
          export KSUVER=$(expr $KSU_VERSION_COUNT + 37185)
          echo "KSUVER=$KSUVER" >> $GITHUB_ENV
          echo "✅ ReSukiSU $(git rev-parse --short HEAD) (ver $KSUVER)"

      - name: 🔧 Setup Patches
        run: |
          cd kernel_workspace
          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            git clone --depth=1 -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git &
          fi
          git clone --depth=1 https://github.com/mrcxlinux/kernel_patches.git &
          git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git &
          git clone --depth=1 https://github.com/palazik/kernel_patches.git wildkernels_patches &
          wait
          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
            cp susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          fi
          cd ./common
          cp ../kernel_patches/common/EnablePOLLY.patch ./
          git apply -p1 < EnablePOLLY.patch || true
          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            echo "📦 Pre-patch fixups (fatalcoder android15-6.6 method)..."
            if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' \
                     -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
            fi
            if ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
            fi
            if ! grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
              sed -i '/#include <linux\/sched\/sysctl\.h>/a #include <linux\/zswap.h>' ./mm/memory.c
            fi
            if grep -qF 'if (vma->vm_end > last_vma_end)' ./fs/proc/task_mmu.c \
               && ! grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c; then
              perl -i -0pe 's/\t\t\tif \(vma->vm_end > last_vma_end\)\n\t\t\t\tsmap_gather_stats\(vma, &mss, last_vma_end\);/\t\t\tif (vma->vm_end > last_vma_end) {\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t}/' ./fs/proc/task_mmu.c
            fi
            echo "📦 Applying 50_ with --forward..."
            patch -p1 --forward < 50_add_susfs_in_gki-android15-6.6.patch || true
            grep -q "SUSFS_IS_INODE_SUS_MAP(file_inode(vma->vm_file))" fs/proc/task_mmu.c \
              || { echo "❌ SUS_MAP guard missing — real failure"; exit 1; }
            echo "✅ SUSFS applied (fatalcoder method)"
          fi
          echo "✅ Base patches applied"

      - name: ⚙️ Configure Kernel Options
        run: |
          cd kernel_workspace
          # xkse4 source uses xkse4_dodge_defconfig (NOT gki_defconfig)
          DEFCONFIG="./common/arch/arm64/configs/xkse4_dodge_defconfig"
          # ── KernelSU / ReSukiSU ──
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          echo "CONFIG_TMPFS_XATTR=y" >> "$DEFCONFIG"
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$DEFCONFIG"
          # NOTE: LZ4K/LZ4KD/LZ4HC/842/ZSMALLOC already in xkse4_dodge_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y" >> "$DEFCONFIG"
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> "$DEFCONFIG"
          echo "CONFIG_LLVM_POLLY=y" >> "$DEFCONFIG"
          echo "CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y" >> "$DEFCONFIG"
          echo 'CONFIG_KSU_FULL_NAME_FORMAT="v%KSU_VERSION%-%COMMIT_SHA%@palaziks"' >> "$DEFCONFIG"
          # ── SUSFS ──
          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            echo "📦 Enabling SUSFS features..."
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
          fi

      # ──────────────────────────────────────────────────────────────────────────
      # REMOVED STEPS (already implemented in xkse4 source):
      #
      # ✗ Apply LZ4 1.10.0 & ZSTD 1.5.7 Patches
      #   → Source commit 5bd8d81: "Update to lz4 1.10.0 & zstd 1.5.7"
      #   → lib/lz4/lz4armv8/ already present
      #
      # ✗ Apply LZ4KD Patch
      #   → Source has: "crypto: add LZ4KD compression support for zram"
      #   → "crypto: add Oplus LZ4K compression support"
      #   → "zram: optimize LZ4K and LZ4KD hot paths"
      #   → CONFIG_CRYPTO_LZ4KD=y, CONFIG_ZRAM_DEF_COMP_LZ4KD=y in defconfig
      #
      # ✗ Configure ZRAM Writeback
      #   → Source has: "zram: serialize backing writeback requests"
      #   → "zram: harden batched backing writeback"
      #   → CONFIG_ZRAM_WRITEBACK=y, CONFIG_ZRAM_WRITEBACK_BATCH=y in defconfig
      #
      # ✗ Configure SchedUtil Optimizations
      #   → Source has: "cpufreq/sched: Explicitly synchronize limits_changed flag"
      #   → "defconfig: Set high-frequency scheduler tick"
      #
      # ✗ F2FS Optimizations
      #   → CONFIG_F2FS_FS=y, CONFIG_F2FS_FS_COMPRESSION=y already in defconfig
      #   → "f2fs: restore normal GC thread scheduling policy"
      #
      # ✗ Enable WireGuard
      #   → CONFIG_WIREGUARD=y already in defconfig
      #
      # ✗ Enable Full Netfilter
      #   → NF_CONNTRACK, NF_NAT, XT_MATCH_HASHLIMIT, XT_MATCH_CONNTRACK,
      #     XT_MATCH_CONNLIMIT, XT_MATCH_STATE, IP_NF_NAT, etc. all in defconfig
      #
      # ✗ Apply NTSync Patch
      #   → CONFIG_NTSYNC=y already in defconfig
      #   → "ntsync: Honour caller's time namespace for absolute MONOTONIC timeouts"
      #
      # ✗ Configure BBR & Brutal
      #   → CONFIG_TCP_CONG_BBR=y, CONFIG_TCP_CONG_BRUTAL=y, CONFIG_TCP_CONG_CUBIC=y,
      #     CONFIG_TCP_CONG_NV=y, CONFIG_TCP_CONG_C2TCP=y, CONFIG_TCP_CONG_ROCCET=y,
      #     CONFIG_DEFAULT_TCP_CONG="bbr", CONFIG_NET_SCH_FQ=y all in defconfig
      #
      # ✗ Configure ADIOS IO
      #   → "Make ADIOS 3.2 compatible with 6.6 kernel"
      #   → "block: update ADIOS to 3.2.0"
      #   → CONFIG_MQ_IOSCHED_ADIOS=y, CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y in defconfig
      #
      # ✗ ABI protection removal
      #   → Source commit: "removed abi protected symbol"
      # ──────────────────────────────────────────────────────────────────────────

      - name: ⚙️ Apply Fengchi (HMBIRD) SCHED Patch
        if: inputs.fengchi
        run: |
          cd kernel_workspace/common
          if [ -d "kernel/sched/hmbird" ]; then
            echo "✅ Fengchi already natively built into this kernel version!"
          else
            echo "⬇️ Fetching Fengchi patch for SM8750..."
            git clone https://github.com/Numbersf/SCHED_PATCH.git -b "sm8750" /tmp/sched_patch
            PATCH_FILE="/tmp/sched_patch/fengchi_oneplus_13_b.patch"
            if [[ -f "$PATCH_FILE" ]]; then
              cp "$PATCH_FILE" ./
              dos2unix fengchi_oneplus_13_b.patch
              patch -p1 -F 3 < fengchi_oneplus_13_b.patch
              echo "✅ Fengchi patch applied!"
            else
              sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
              wget -q https://github.com/Numbersf/Action-Build/raw/SukiSU-Ultra/patches/hmbird_patch.patch
              patch -p1 -F 3 < hmbird_patch.patch
              echo "✅ OGKI to GKI patch applied!"
            fi
          fi
          cat >> arch/arm64/configs/xkse4_dodge_defconfig << 'EOF'
          CONFIG_SCHED_CLASS_EXT=y
          CONFIG_OPLUS_FEATURE_HMBIRD_BOOST=y
          CONFIG_OPLUS_FEATURE_HMBIRD_SCHED=y
          EOF

      - name: Prepare CPU Optimizations (Oryon SM8750)
        if: inputs.cpu_opt
        run: |
          # xkse4 source already sets in Makefile:
          #   KBUILD_CFLAGS += -march=armv9.1-a+nosve+crypto+sha3+sm4+rng
          # and xkse4_dodge_defconfig already has the maintainer's intended
          # HZ, PREEMPT, NO_HZ, ARCH_QCOM, ERRATUM settings.
          #
          # We ONLY override the compiler flag via EXTRA_CFLAGS:
          #   -mcpu=oryon-1  → Oryon-specific instruction scheduling & pipeline
          #                     tuning (supersedes -march in Clang)
          #   -fno-strict-aliasing → safety (kernel code relies on type punning)
          #   -fno-delete-null-pointer-checks → safety (kernel null checks)
          #
          # We do NOT touch HZ/PREEMPT/NO_HZ/ARCH_QCOM/ERRATUM in defconfig —
          # those are already set by the xkse4 maintainer to their preferred values.
          echo "EXTRA_CFLAGS=-mcpu=oryon-1 -fno-strict-aliasing -fno-delete-null-pointer-checks" >> $GITHUB_ENV
          echo "✅ Oryon -mcpu=oryon-1 flags prepared (overrides source -march=armv9.1-a at compile time)."

      - name: Apply Unicode Bypass Fix
        working-directory: kernel_workspace/common
        run: |
          PATCH_URL="https://github.com/palazik/kernel_patches/raw/main/common/unicode_bypass_fix_6.1+.patch"
          wget -qO /tmp/ub_fix.patch "$PATCH_URL" 2>/dev/null && \
            patch -p1 --forward < /tmp/ub_fix.patch || true
          echo "Unicode fix applied"

      - name: Apply BORE Scheduler
        if: inputs.bore_enable
        working-directory: kernel_workspace/common
        run: |
          echo "CONFIG_SCHED_BORE=y" >> arch/arm64/configs/xkse4_dodge_defconfig
          BORE_URL="https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/patches/bore.patch"
          wget -qO /tmp/bore.patch "$BORE_URL"
          patch -p1 -F 3 < /tmp/bore.patch
          echo "✅ BORE scheduler applied"

 

  - name: Apply Memory & Scheduler Optimization Patches
    if: inputs.mem_opt_patches
    working-directory: kernel_workspace/common
    run: |
      echo "Applying WildKernels optimization patches (xkse4-compatible subset)..."
      PATCHES_DIR="../wildkernels_patches/common"

      # ── REMOVED (already in xkse4 source or context-incompatible): ──
      # ✗ optimized_mem_operations.patch      → reversed/previously applied (lib/string.c)
      # ✗ file_struct_8bytes_align.patch      → reversed/previously applied (include/linux/fs.h)
      # ✗ optimise_memcmp.patch               → reversed/previously applied (arch/arm64/lib/memcmp.S)
      # ✗ minimise_wakeup_time.patch          → hunk FAILED (kernel/time/alarmtimer.c)
      # ✗ int_sqrt.patch                      → hunk FAILED (lib/math/int_sqrt.c)
      # ✗ reduce_gc_thread_sleep_time.patch   → reversed/previously applied (fs/f2fs/gc.h)
      # ✗ reduce_freeze_timeout.patch         → partial apply (main.c OK, process.c FAILED)
      # ✗ clear_page_16bytes_align.patch      → hunk FAILED (arch/arm64/lib/clear_page.S)
      # ✗ adjust_cpu_scan_order.patch         → reversed/previously applied (kernel/sched/fair.c)
      # ✗ avoid_extra_s2idle_wake_attempts.patch → reversed/previously applied (wakeup.c)
      # ────────────────────────────────────────────────────────────────

      apply_patch() {
        local patch="$1"
        if [ -f "$PATCHES_DIR/$patch" ]; then
          patch -p1 --forward < "$PATCHES_DIR/$patch" && \
            echo "✅ $patch" || echo "⚠️ $patch (skipped/conflict)"
        else
          echo "⚠️ $patch not found, skipping"
        fi
      }

      # ── Memory / cache ──
      apply_patch "reduce_cache_pressure.patch"
      apply_patch "mem_opt_prefetch.patch"
      apply_patch "disable_cache_hot_buddy.patch"

      # ── TCP / networking ──
      apply_patch "force_tcp_nodelay.patch"
      apply_patch "increase_sk_mem_packets.patch"

      # ── F2FS / ext4 ──
      apply_patch "f2fs_reduce_congestion.patch"
      apply_patch "f2fs_enlarge_min_fsync_blocks.patch"
      apply_patch "increase_ext4_default_commit_age.patch"

      # ── Power / wakelock ──
      apply_patch "add_timeout_wakelocks_globally.patch"
      apply_patch "reduce_pci_pme_wakeups.patch"

      # ── CPUFreq ──
      apply_patch "add_limitation_scaling_min_freq.patch"
      apply_patch "re_write_limitation_scaling_min_freq.patch"
      apply_patch "use_unlikely_wrap_cpufreq.patch"

      # ── Log noise reduction ──
      apply_patch "silence_irq_cpu_logspam.patch"
      apply_patch "silence_system_logspam.patch"

      echo "✅ Optimization patches applied (15/25 — 10 skipped, already in xkse4 source)"

      - name: Add Droidspaces Support
        if: inputs.droidspaces_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling Droidspaces (portable Linux containers)..."
          DS_DIR="../wildkernels_patches/common/droidspaces"
          if [ -f "$DS_DIR/fix_sysvipc_kabi_6_7_8.patch" ]; then
            patch -p1 --forward < "$DS_DIR/fix_sysvipc_kabi_6_7_8.patch" || true
          else
            echo "⚠️ fix_sysvipc_kabi_6_7_8.patch not found, skipping KABI fix"
          fi
          if [ -f "$DS_DIR/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch" ]; then
            patch -p1 --forward < "$DS_DIR/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch" || true
          fi
          cat >> arch/arm64/configs/xkse4_dodge_defconfig << 'EOF'
          CONFIG_SYSVIPC=y
          CONFIG_DEVTMPFS=y
          CONFIG_PID_NS=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          EOF
          echo "✅ Droidspaces support enabled"

      - name: Add IP_SET + IPv6 NAT Support
        if: inputs.ip_set_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling IP_SET + IPv6 NAT..."
          echo "CONFIG_BPF_STREAM_PARSER=y" >> arch/arm64/configs/xkse4_dodge_defconfig
          cat >> arch/arm64/configs/xkse4_dodge_defconfig << 'EOF'
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF
          IPNAT_FIX="../wildkernels_patches/common/IPv6_NAT_FIX.patch"
          if [ -f "$IPNAT_FIX" ]; then
            patch -p1 -F 3 < "$IPNAT_FIX" || true
            echo "✅ IPv6 NAT fix applied"
          else
            echo "⚠️ IPv6_NAT_FIX.patch not found, skipping"
          fi
          echo "✅ IP_SET + IPv6 NAT enabled"

      - name: Add TTL/HL Target Support
        if: inputs.ttl_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling TTL/HL Target (hide tethering from carrier)..."
          cat >> arch/arm64/configs/xkse4_dodge_defconfig << 'EOF'
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          EOF
          echo "✅ TTL/HL Target enabled"

      - name: Enable LRNG v59
        if: inputs.lrng_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling LRNG v59..."
          git clone --depth=1 https://github.com/smuellerDD/lrng.git /tmp/lrng_src
          mkdir -p drivers/char/lrng
          cp -r /tmp/lrng_src/drivers/char/lrng/* drivers/char/lrng/
          cat >> arch/arm64/configs/xkse4_dodge_defconfig << 'EOF'
          CONFIG_LRNG=y
          CONFIG_LRNG_SHA256=y
          CONFIG_LRNG_COLLECTION_SIZE=1024
          CONFIG_LRNG_HEALTH_TESTS=y
          CONFIG_LRNG_RCT_CUTOFF=31
          CONFIG_LRNG_APT_CUTOFF=325
          CONFIG_LRNG_IRQ=y
          CONFIG_LRNG_CONTINUOUS_COMPRESSION_ENABLED=y
          EOF

      - name: Enable Wakelock Blocker
        if: inputs.wakelock_blocker
        working-directory: kernel_workspace/common
        run: |
          # NOTE: xkse4 source already has Boeffla Wakelock Blocker (sysfs-based, userspace configurable).
          # This step adds a COMPLEMENTARY hardcoded blocklist at a lower level (wakeup.c)
          # that blocks specific sources BEFORE they can hold or abort suspend.
          # The two work together: Boeffla for user-configurable blocking, this for kernel-level hard blocks.
          WAKEUP_C="drivers/base/power/wakeup.c"
          if [ ! -f "$WAKEUP_C" ]; then
            echo "Error: $WAKEUP_C not found!"
            exit 1
          fi
          cp "$WAKEUP_C" "$WAKEUP_C.bak"
          awk '
          1;
          /#include "power\.h"/ {
              print ""
              print "/* palaziks: wakeup source blocker */"
              print "static const char * const blocked_wakeup_sources[] = {"
              print "\t\"WLAN_pm_wlock\","
              print "\t\"IPA_WS\","
              print "\t\"qcom_rx_wakelock\","
              print "};"
              print ""
              print "static bool is_wakeup_source_blocked(const char *name)"
              print "{"
              print "\tint i;"
              print ""
              print "\tif (!name)"
              print "\t\treturn false;"
              print ""
              print "\tfor (i = 0; i < ARRAY_SIZE(blocked_wakeup_sources); i++) {"
              print "\t\tif (!strcmp(name, blocked_wakeup_sources[i]))"
              print "\t\t\treturn true;"
              print "\t}"
              print "\treturn false;"
              print "}"
          }
          ' "$WAKEUP_C" > tmp.c && mv tmp.c "$WAKEUP_C"
          awk '
          /^void __pm_stay_awake\(struct wakeup_source \*ws\)$/ { infn=1 }
          /^void pm_wakeup_ws_event\(struct wakeup_source \*ws, unsigned int msec, bool hard\)$/ { infn=1 }
          infn && /^\tspin_lock_irqsave\(&ws->lock, flags\);$/ {
              print "\t/* palaziks: drop events from blocked wakeup sources before they can hold or abort suspend */"
              print "\tif (is_wakeup_source_blocked(ws->name))"
              print "\t\treturn;"
              print ""
              infn=0
          }
          1
          ' "$WAKEUP_C" > tmp.c && mv tmp.c "$WAKEUP_C"
          FAILED=0
          if ! grep -q "blocked_wakeup_sources\[\]" "$WAKEUP_C"; then
            echo "❌ Blocklist array NOT inserted"
            FAILED=1
          fi
          HOOK_COUNT=$(grep -c "is_wakeup_source_blocked(ws->name)" "$WAKEUP_C")
          if [ "$HOOK_COUNT" -ne 2 ]; then
            echo "❌ Expected 2 blocking hooks (__pm_stay_awake + pm_wakeup_ws_event), found $HOOK_COUNT"
            FAILED=1
          fi
          echo "── diff ──"
          diff -u "$WAKEUP_C.bak" "$WAKEUP_C" || true
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Wakelock blocker injection FAILED. Restoring original."
            mv "$WAKEUP_C.bak" "$WAKEUP_C"
            exit 1
          fi
          rm -f "$WAKEUP_C.bak"
          echo "✅ Wakelock blocker applied and verified (complements Boeffla in source)"

      - name: Apply BBRv3
        if: inputs.bbrv3_enable
        working-directory: kernel_workspace/common
        run: |
          echo "::group::Apply BBRv3 patches"
          echo "NOTE: BBRv3 was added then REVERTED in xkse4 source. Re-applying..."
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> arch/arm64/configs/xkse4_dodge_defconfig
          echo "CONFIG_TCP_CONG_BBR3=y"     >> arch/arm64/configs/xkse4_dodge_defconfig
          BBRV3_PATCH="../wildkernels_patches/common/bbrv3/0001-net-tcp-backport-BBRv3-to-${ANDROID_VERSION}-${KERNEL_VERSION}.patch"
          if [ -f "$BBRV3_PATCH" ]; then
            patch -p1 -F 3 < "$BBRV3_PATCH"
            echo "✅ BBRv3 patch applied"
          else
            echo "::warning::BBRv3 patch not found at $BBRV3_PATCH — skipping"
          fi
          echo "::endgroup::"

      - name: Configure LTO
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/xkse4_dodge_defconfig"
          if [[ "${{ github.event.inputs.lto_type }}" == "none" ]]; then
            echo "CONFIG_LTO_CLANG_NONE=y" >> "$DEFCONFIG"
          elif [[ "${{ github.event.inputs.lto_type }}" == "full" ]]; then
            echo "CONFIG_LTO_CLANG_FULL=y" >> "$DEFCONFIG"
          else
            echo "CONFIG_LTO_CLANG_THIN=y" >> "$DEFCONFIG"
          fi

      - name: Configure Re-Kernel
        if: inputs.rekernel_enable
        run: |
          cd kernel_workspace
          echo "NOTE: Re-Kernel was removed from xkse4 source. Re-adding config only."
          echo "NOTE: You may need to re-apply the Re-Kernel source patch separately."
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/xkse4_dodge_defconfig

      - name: Configure Baseband Guard
        if: inputs.baseband_guard
        run: |
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/xkse4_dodge_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: 📦 Add build name
        run: |
          cd kernel_workspace
          sudo sed -i "s/-4k/-palaziks-ShiftPorts/g" ./common/arch/arm64/configs/xkse4_dodge_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/xkse4_dodge_defconfig

      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export MAP="-fdebug-prefix-map=${GITHUB_WORKSPACE}=. -fmacro-prefix-map=${GITHUB_WORKSPACE}=. -ffile-prefix-map=${GITHUB_WORKSPACE}=."
          export PATH="$WORKDIR/kernel_workspace/zyc-clang/bin:$WORKDIR/kernel_workspace/build-tools/linux-x86/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/zyc-clang/bin"
          echo "Clang: $($CLANG_DIR/clang --version | head -n 1)"
          echo "LLD:   $($CLANG_DIR/ld.lld --version | head -n 1)"
          pahole --version 2>/dev/null || echo "Pahole: Not Installed"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_IS_KERNEL_COMPILING=true
          mkdir -p $GITHUB_WORKSPACE/kout
          mkdir -p $GITHUB_WORKSPACE/ldcache_6.6.142
          cd kernel_workspace/common
          echo '#!/bin/bash' > ld-wrapper
          echo 'ld.lld "$@" --thinlto-cache-dir=$GITHUB_WORKSPACE/ldcache_6.6.142 --thinlto-jobs=$(($(nproc --all) / 2))' >> ld-wrapper
          chmod +x ld-wrapper
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so || true
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so || true
          chmod 777 ./*.so || true
          SO_DIR=$(pwd)
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          # defconfig pass — using xkse4_dodge_defconfig
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$(pwd)/ld-wrapper" HOSTLD="$(pwd)/ld-wrapper" \
            O=$GITHUB_WORKSPACE/kout \
            KCFLAGS="-O3 -pipe -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option" \
            xkse4_dodge_defconfig
          # Image build — EXTRA_CFLAGS includes -mcpu=oryon-1 which overrides source's -march=armv9.1-a
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$(pwd)/ld-wrapper" HOSTLD="$(pwd)/ld-wrapper" \
            O=$GITHUB_WORKSPACE/kout \
            KCFLAGS="-O2 -pipe -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option ${EXTRA_CFLAGS:-} ${MAP}" \
            Image
          echo "Kernel Compilation Complete!"
          ccache -c
          ccache --evict-older-than 10800s
          echo "CCache Status:"
          ccache -s
          df -h

      - name: 📦 Save New CCache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-neov4-6.6.142-xkse4-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: 📦 Save LTO CCache
        if: success() && inputs.lto_type == 'thin'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.LDCACHE_DIR }}
          key: lto-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: 🧠 Package AK3 ZIP
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/palazik/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp $GITHUB_WORKSPACE/kout/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "Kernel Image not found, build may have failed."
            exit 1
          fi
          KSU_TYPENAME="ReSukiSU"
          AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_6.6.142_palaziks-ShiftPorts-xkse4.zip
          FULL_VERSION=6.6.142-palaziks-ShiftPorts
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "Source: xkse4/android_kernel_common_oneplus_sm8750" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "SuSFS: ${{ github.event.inputs.SUSFS }}" >> ./ak3.log
          echo "BBRv3: ${{ github.event.inputs.bbrv3_enable }}" >> ./ak3.log
          echo "BORE: ${{ github.event.inputs.bore_enable }}" >> ./ak3.log
          echo "Fengchi: ${{ github.event.inputs.fengchi }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          echo "LRNG: ${{ github.event.inputs.lrng_enable }}" >> ./ak3.log
          echo "CPU Opt (oryon-1): ${{ github.event.inputs.cpu_opt }}" >> ./ak3.log
          echo "Wakelock Blocker: ${{ github.event.inputs.wakelock_blocker }}" >> ./ak3.log
          echo "Droidspaces: ${{ github.event.inputs.droidspaces_enable }}" >> ./ak3.log
          echo "IP_SET+IPv6NAT: ${{ github.event.inputs.ip_set_enable }}" >> ./ak3.log
          echo "TTL: ${{ github.event.inputs.ttl_enable }}" >> ./ak3.log
          echo "MemOpt: ${{ github.event.inputs.mem_opt_patches }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "── Built-in (xkse4 source) ──" >> ./ak3.log
          echo "BBR/Brutal/C2TCP/ROCCET (BBR default), ADIOS 3.2, LZ4 1.10.0+armv8, ZSTD 1.5.7," >> ./ak3.log
          echo "LZ4K/LZ4KD, ZRAM Writeback+Batch, NTSync, WireGuard, Boeffla WL Blocker," >> ./ak3.log
          echo "Full Netfilter, F2FS+compression, Oryon -march=armv9.1-a, EROFS opts" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_zip.outputs.ak3name }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip

      - name: 📝 Make ZRAM module
        run: |
          ZRAM_KO=$(find $GITHUB_WORKSPACE/kout -name "zram.ko" | head -1)
          if [ -z "$ZRAM_KO" ]; then
            echo "⚠️ zram.ko not found, skipping"
            exit 0
          fi
          curl -L "https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/zram.zip" -o zram.zip
          unzip -q zram.zip -d zram
          find zram -name "zram.ko" -exec cp "$ZRAM_KO" {} \;
          rm -f zram.zip
          echo "✅ Done!"

      - name: 📤 Upload zram.zip
        uses: actions/upload-artifact@v4
        with:
          name: zram-module
          path: ./zram/*

      - name: Send Telegram Notification (Success)
        if: success()
        env:
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")
          COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c1-8)
          COMMIT_MSG="Workflow Dispatch: 6.6.142 (xkse4)"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          export TG_KERNEL_VERSION="6.6.142"
          export TG_KSU_DISPLAY="ReSukiSU"
          export TG_KSUVER="${{ env.KSUVER }}"
          export TG_SUFFIX="palaziks-ShiftPorts"
          export TG_LTO="${{ github.event.inputs.lto_type }}"
          export TG_BUILD_NUM="${{ github.run_number }}"
          export TG_TIME_NOW="$TIME_NOW"
          export TG_RUN_URL="$RUN_URL"
          export TG_REPO="${{ github.repository }}"
          export TG_SUSFS="${{ github.event.inputs.SUSFS }}"
          export TG_BBRV3="${{ github.event.inputs.bbrv3_enable }}"
          export TG_BORE="${{ github.event.inputs.bore_enable }}"
          export TG_FENGCHI="${{ github.event.inputs.fengchi }}"
          export TG_BBG="${{ github.event.inputs.baseband_guard }}"
          export TG_LRNG="${{ github.event.inputs.lrng_enable }}"
          export TG_CPU_OPT="${{ github.event.inputs.cpu_opt }}"
          export TG_WLB="${{ github.event.inputs.wakelock_blocker }}"
          export TG_DROIDSPACES="${{ github.event.inputs.droidspaces_enable }}"
          export TG_IP_SET="${{ github.event.inputs.ip_set_enable }}"
          export TG_TTL="${{ github.event.inputs.ttl_enable }}"
          export TG_MEM_OPT="${{ github.event.inputs.mem_opt_patches }}"
          export TG_REKERNEL="${{ github.event.inputs.rekernel_enable }}"
          TELEGRAPH_URL=$(python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, os
          e = os.environ.get
          def feat(val, name):
              icon = "✅" if val == "true" else "❌"
              return {"tag": "li", "children": [f"{icon} {name}"]}
          content = [
              {"tag": "h3", "children": ["OnePlus 13 (PJZ110) — palaziks kernel (xkse4 source)"]},
              {"tag": "hr"},
              {"tag": "h4", "children": ["📋 Build Info"]},
              {"tag": "ul", "children": [
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Device: "]}, "OnePlus 13 PJZ110 (CN) / SM8750"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Kernel: "]}, f"{e('TG_KERNEL_VERSION')}-android15"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Source: "]}, "xkse4/android_kernel_common_oneplus_sm8750"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Manager: "]}, f"{e('TG_KSU_DISPLAY')} v{e('TG_KSUVER')}"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Suffix: "]}, f"-{e('TG_SUFFIX')}"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["LTO: "]}, e("TG_LTO")]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Clang: "]}, "ZyCromerZ-19"]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Build #: "]}, e("TG_BUILD_NUM")]},
                  {"tag": "li", "children": [{"tag": "strong", "children": ["Time: "]}, e("TG_TIME_NOW")]}
              ]},
              {"tag": "hr"},
              {"tag": "h4", "children": ["⚡ Features (added by workflow)"]},
              {"tag": "ul", "children": [
                  feat(e("TG_SUSFS"),   "SuSFS"),
                  feat(e("TG_BBRV3"),   "BBRv3 TCP Congestion Control (re-applied, was reverted)"),
                  feat(e("TG_BORE"),    "BORE Scheduler"),
                  feat(e("TG_FENGCHI"), "Fengchi/HMBIRD Optimization"),
                  feat(e("TG_BBG"),     "Baseband Guard"),
                  feat(e("TG_LRNG"),    "LRNG v59"),
                  feat(e("TG_CPU_OPT"), "Oryon -mcpu=oryon-1 tuning (overrides source -march)"),
                  feat(e("TG_WLB"),     "Custom Wakelock Blocker (complements Boeffla)"),
                  feat(e("TG_REKERNEL"),"Re-Kernel (re-added, was removed)"),
                  feat(e("TG_DROIDSPACES"), "Droidspaces (proot-distro)"),
                  feat(e("TG_IP_SET"),  "IP_SET + IPv6 NAT"),
                  feat(e("TG_TTL"),     "TTL/HL Target"),
                  feat(e("TG_MEM_OPT"), "Extra Memory/Sched Optimizations"),
              ]},
              {"tag": "hr"},
