                  {"tag": "li", "children": ["✅ F2FS + compression"]},
                  {"tag": "li", "children": ["✅ Oryon -march=armv9.1-a+nosve+crypto+sha3+sm4+rng"]},
                  {"tag": "li", "children": ["✅ EROFS optimizations"]},
